backend:
  name: github
  repo: freedombeagle/freedombeagle.github.io
  branch: main

site_url: https://freedombeagle.github.io
display_url: https://freedombeagle.github.io
logo_url: https://freedombeagle.github.io/assets/img/freedom-beagle-logo.png

media_folder: assets/img/uploads
public_folder: /assets/img/uploads

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: _posts
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: articles/{{slug}}.html
    sortable_fields:
      fields: [date, title]
      default:
        field: date
        direction: descending
    fields:
      - name: title
        label: Headline
        widget: string
        hint: "The article headline as it appears on the site."
      - name: date
        label: Publish date
        widget: datetime
        time_format: false
        format: "YYYY-MM-DD"
      - name: section
        label: Section
        widget: select
        options:
          - On the Scent
          - Grievance Audit
          - Risk of Rights
          - Field Notes
        default: Field Notes
      - name: dek
        label: Teaser (dek)
        widget: text
        hint: "One or two sentences shown under the headline on the homepage and section pages."
      - name: series
        label: Series (On the Scent only)
        widget: string
        required: false
        hint: "Only for multi-part On the Scent investigations. Enter the series slug exactly as it appears in Site Settings > Series (e.g. flock-cameras). Leave blank for standalone pieces."
      - name: grade
        label: Score (Grievance Audit / Risk of Rights only)
        widget: number
        required: false
        hint: "0-100 grade shown as a badge next to the headline. Leave blank for non-scorecard pieces."
      - name: body
        label: Article
        widget: markdown
        hint: "The article itself. Use the image button to add photos. For video, paste a YouTube/Rumble embed code."

  - name: series_settings
    label: Site Settings
    files:
      - name: series
        label: Series
        file: _data/series.yml
        description: "Register each On the Scent series here so it can be tagged on articles. Set Status to \"Complete\" once the investigation is finished — its articles move from the On the Scent feed to the Series archive page automatically."
        fields:
          - name: series
            label: Series
            widget: list
            summary: "{{name}} ({{status}})"
            fields:
              - name: name
                label: Series name
                widget: string
              - name: slug
                label: Slug
                widget: string
                hint: "Lowercase, hyphenated. Must match the \"Series\" field entered on each article (e.g. flock-cameras)."
              - name: status
                label: Status
                widget: select
                options:
                  - { label: "Active — still publishing new parts", value: active }
                  - { label: "Complete — move to the Series archive", value: complete }
                default: active
              - name: description
                label: Description
                widget: text
                required: false
                hint: "One sentence shown at the top of this series on the Series archive page."
