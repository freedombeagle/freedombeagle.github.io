title: Freedom Beagle
description: Independent journal on constitutional rights, the law as it actually applies to you, and the current events testing both.
url: "https://jagar05.github.io"
baseurl: "/freedom-beagle"

permalink: /articles/:title:output_ext

# Build posts even if their timestamp is ahead of the build server's clock.
# Without this, same-day posts with later-hour timestamps get skipped as "future".
future: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article

exclude:
  - EDITING.md
  - README.md
