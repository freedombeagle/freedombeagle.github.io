<!DOCTYPE html>
<html lang="en">
<head>
<title>{{ page.title }} — {{ site.title }}</title>
<meta name="description" content="{{ page.description }}">
{% include head.html %}
</head>
<body>

{% include theme-toggle.html %}

{% include site-header.html %}

<div class="wrap">
  <div class="section-page">
    <h1 class="section-page__title">{{ page.title }}</h1>
    <p class="section-page__desc">{{ page.description }}</p>

    <div class="search-box">
      <input type="search" id="search-input" class="search-box__input" placeholder="Search headlines, deks, and sections&hellip;" autocomplete="off">
      <p class="search-box__status" id="search-status"></p>
    </div>

    <div id="search-results"></div>
  </div>

  <footer class="site-footer">
    <span>&copy; 2026 Freedom Beagle. No masters. No leash.</span>
    <span><a href="{{ '/about.html' | relative_url }}">About &amp; Standards</a> &middot; <a href="{{ '/congress-explained.html' | relative_url }}">Congress Explained</a> &middot; <a href="{{ '/' | relative_url }}">Home</a></span>
  </footer>
</div>

<script src="{{ '/assets/js/search.js' | relative_url }}" data-search-json="{{ '/search.json' | relative_url }}"></script>
<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
