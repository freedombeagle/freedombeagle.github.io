<!DOCTYPE html>
<html lang="en">
<head>
<title>{{ page.title }} — {{ site.title }}</title>
<meta name="description" content="{{ page.description }}">
{% include head.html %}
</head>
<body>

{% include theme-toggle.html %}

{% include site-header.html %}

<div class="wrap">
  <article class="article">
    <h1 class="article__headline">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="article__byline">{{ page.subtitle }}</p>{% endif %}
    <div class="article__body">
      {{ content }}
    </div>
  </article>

  <footer class="site-footer">
    <span>&copy; 2026 Freedom Beagle. No masters. No leash.</span>
    <span><a href="{{ '/about.html' | relative_url }}">About &amp; Standards</a> &middot; <a href="{{ '/congress-explained.html' | relative_url }}">Congress Explained</a> &middot; <a href="{{ '/' | relative_url }}">Home</a></span>
  </footer>
</div>

<script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
